name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: casamx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
        run: npx prisma migrate deploy

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          NODE_ENV: test
        run: npx tsx prisma/seed.ts

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/casamx_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          NODE_ENV: test
          PORT: 3001
          FRONTEND_URL: http://localhost:3000
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist
          retention-days: 7
